<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokopia Analyze</title>

<style>

  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --accent: #f59e0b;
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --card: #1e1e35;
    --card-hover: #252545;
    --border: #2d2d50;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --tag-bg: #2a2a4a;
    --check: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a3e 0%, #0f0f2a 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .logo {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    letter-spacing: 1px;
    text-decoration: none;
  }
  .search-wrap {
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    gap: 8px;
    flex: 1;
    max-width: 280px;
  }
  .search-wrap input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; width: 100%;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .header-stats { color: var(--text-muted); font-size: 13px; margin-left: auto; }

  .layout { display: flex; min-height: calc(100vh - 58px); }

  .sidebar {
    width: 270px; min-width: 270px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 14px;
    overflow-y: auto;
    position: sticky;
    top: 58px;
    height: calc(100vh - 58px);
  }
  .sidebar-section { margin-bottom: 18px; }
  .sidebar-title {
    font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-muted); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .sidebar-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
  .tag-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    background: var(--tag-bg); border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 5px;
    padding: 3px 9px; font-size: 11px;
    cursor: pointer; transition: all 0.12s; user-select: none;
  }
  .tag:hover { border-color: var(--primary); color: var(--text); }
  .tag.active { background: var(--primary); border-color: var(--primary); color: white; }
  .clear-btn {
    font-size: 11px; color: var(--text-muted);
    cursor: pointer; text-decoration: underline;
    margin-top: 5px; display: inline-block;
  }
  .clear-btn:hover { color: var(--text); }

  .action-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 10px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--border); align-items: center;
  }
  .btn {
    padding: 6px 13px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.12s; display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--primary); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
  .btn-danger:hover { background: #ef4444; color: white; }
  .selected-count { font-size: 13px; color: var(--accent); font-weight: 700; margin-left: auto; }

  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  .sort-bar {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted); flex-wrap: wrap;
  }
  .sort-bar select {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 3px 8px; font-size: 12px; cursor: pointer; outline: none;
  }
  .result-count { font-size: 12px; color: var(--text-muted); }
  .filter-summary { font-size: 11px; color: #a5b4fc; margin-left: auto; max-width: 60%; text-align: right; line-height: 1.4; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
    gap: 10px; padding: 14px; align-items: start;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 11px; padding: 13px;
    transition: all 0.12s; cursor: pointer;
  }
  .card:hover { background: var(--card-hover); border-color: #4a4a80; transform: translateY(-1px); }
  .card.selected { border-color: var(--check); background: #132a1e; }
  .card.env-akarui    { background: color-mix(in srgb, var(--card), rgba(250,204,21,1) 14%); }
  .card.env-atatakai  { background: color-mix(in srgb, var(--card), rgba(239,68,68,1) 15%); }
  .card.env-uruoite   { background: color-mix(in srgb, var(--card), rgba(59,130,246,1) 15%); }
  .card.env-kurai     { background: var(--card); }
  .card.env-suzushii  { background: color-mix(in srgb, var(--card), rgba(132,204,22,1) 14%); }
  .card.env-kansou    { background: color-mix(in srgb, var(--card), rgba(180,110,40,1) 16%); }
  .card.env-akarui:hover   { background: color-mix(in srgb, var(--card-hover), rgba(250,204,21,1) 17%); }
  .card.env-atatakai:hover { background: color-mix(in srgb, var(--card-hover), rgba(239,68,68,1) 18%); }
  .card.env-uruoite:hover  { background: color-mix(in srgb, var(--card-hover), rgba(59,130,246,1) 18%); }
  .card.env-suzushii:hover { background: color-mix(in srgb, var(--card-hover), rgba(132,204,22,1) 17%); }
  .card.env-kansou:hover   { background: color-mix(in srgb, var(--card-hover), rgba(180,110,40,1) 19%); }

  .card-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 10px; }
  .checkbox {
    width: 19px; height: 19px; border: 2px solid var(--border);
    border-radius: 5px; flex-shrink: 0; margin-top: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; background: var(--bg3);
  }
  .card.selected .checkbox { background: var(--check); border-color: var(--check); }
  .checkbox::after {
    content: ''; width: 4px; height: 8px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px); opacity: 0; transition: opacity 0.1s;
  }
  .card.selected .checkbox::after { opacity: 1; }

  .card-name-block { flex: 1; min-width: 0; }
  .card-no { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }
  .card-name { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .card-hitoshou { font-size: 10px; color: var(--accent); margin-top: 2px; }

  .card-section { margin-bottom: 7px; }
  .card-label {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .card-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
  }
  .card-tag.tokui { background: rgba(99,102,241,0.18); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); font-size: 12px; }
  .card-tag.kankyo { background: rgba(16,185,129,0.13); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); font-size: 12px; }
  .card-tag.sukimono { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .card-tag.aji { background: rgba(244,114,182,0.15); color: #f9a8d4; border: 1px solid rgba(244,114,182,0.3); font-size: 12px; }
  .card-tag.hl { box-shadow: 0 0 0 2px white; }

  .ibe-divider {
    grid-column: 1 / -1; padding: 6px 0;
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px; font-weight: 600;
  }
  .ibe-divider::before, .ibe-divider::after {
    content: ''; flex: 1; border-top: 1px dashed var(--border);
  }

  .selected-panel {
    background: #0c1f18; border-top: 2px solid var(--check);
    padding: 12px 14px; display: none;
  }
  .selected-panel.show { display: block; }
  .selected-panel-title {
    font-size: 12px; font-weight: 700; color: var(--check);
    margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
  }
  .selected-summary { display: flex; flex-wrap: wrap; gap: 5px; }
  .selected-chip {
    background: rgba(16,185,129,0.13); border: 1px solid rgba(16,185,129,0.3);
    color: #6ee7b7; border-radius: 20px; padding: 3px 10px;
    font-size: 11px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .selected-chip .rm {
    cursor: pointer; opacity: 0.6; font-size: 13px; line-height: 1;
  }
  .selected-chip .rm:hover { opacity: 1; }

  .empty-state {
    grid-column: 1/-1; text-align: center;
    padding: 50px 20px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a80; }

  .filter-fab {
    display: none;
  }
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
  }
  .drawer-overlay.open { display: block; }
  .sidebar-close-btn {
    display: none;
    width: 100%;
    margin-bottom: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: -290px;
      width: 270px;
      height: 100vh;
      z-index: 160;
      transition: left 0.25s ease;
      top: 0;
    }
    .sidebar.open { left: 0; }
    .filter-fab { display: inline-flex; align-items: center; gap: 6px; }
    .sidebar-close-btn { display: block; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; padding: 10px; }
    .logo { font-size: 18px; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .action-bar { gap: 5px; }
    .btn { font-size: 11px; padding: 5px 10px; }
  }

</style>
</head>
<body>

<div class="header">
  <div class="logo">✨ Pokopia Analyze</div>
  <div class="search-wrap">
    <span style="color:var(--text-muted)">&#x1F50D;</span>
    <input type="text" id="searchInput" placeholder="ポケモン名で検索...">
  </div>
  <div class="header-stats" id="headerStats"></div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close-btn" onclick="closeDrawer()">✕ 閉じる</button>
    <div class="sidebar-section">
      <div class="sidebar-title"><span class="dot"></span>得意なこと</div>
      <div class="tag-grid" id="tokuiTags"></div>
      <span class="clear-btn" onclick="clearFilter('tokui')">× クリア</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title"><span class="dot" style="background:#10b981"></span>好きな環境</div>
      <div class="tag-grid" id="kankyoTags"></div>
      <span class="clear-btn" onclick="clearFilter('kankyo')">× クリア</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title"><span class="dot" style="background:#f472b6"></span>好きな味</div>
      <div class="tag-grid" id="ajiTags"></div>
      <span class="clear-btn" onclick="clearFilter('aji')">× クリア</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title"><span class="dot" style="background:#f59e0b"></span>好きなもの</div>
      <div class="tag-grid" id="sukimonoTags"></div>
      <span class="clear-btn" onclick="clearFilter('sukimono')">× クリア</span>
    </div>
    <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:4px" onclick="clearAllFilters()">↺ フィルター全リセット</button>
  </div>

  <div class="main">
    <div class="action-bar">
      <button class="btn btn-outline filter-fab" id="filterFab" onclick="openDrawer()">&#x1F50D; フィルター</button>
      <button class="btn btn-primary" id="showSelectedBtn" onclick="toggleShowSelected()">✔ チェックしたポケモンを表示</button>
      <button class="btn btn-danger" onclick="clearAllSelected()">× チェックを全解除</button>
<span class="selected-count" id="selectedCount"></span>
    </div>

    <div class="sort-bar">
      <span>並び順：</span>
      <select id="sortSelect" onchange="applyFilters()">
        <option value="no">図鑑No.順</option>
        <option value="name">名前順</option>
        <option value="kankyo">好きな環境順</option>
        <option value="tokui">得意なこと順</option>
      </select>
      <span class="result-count" id="resultCount"></span>
      <span class="filter-summary" id="filterSummary"></span>
    </div>

    <div class="grid" id="pokemonGrid"></div>

    <div class="selected-panel" id="selectedPanel">
      <div class="selected-panel-title">✔ 選択中のポケモン (<span id="selectedPanelCount">0</span>体)</div>
      <div class="selected-summary" id="selectedSummary"></div>
    </div>
  </div>
</div>

POKEMON_DATA.sort((a, b) => {
  if (a.isIbe && !b.isIbe) return 1;
  if (!a.isIbe && b.isIbe) return -1;
  if (!a.isIbe && !b.isIbe) return a.no - b.no;
  const na = parseInt(String(a.no).replace(/[^0-9]/g, '')) || 0;
  const nb = parseInt(String(b.no).replace(/[^0-9]/g, '')) || 0;
  return na - nb;
});

const allTokui = _chiraIdx >= 0 ? [...allTokuiRaw.slice(0, _chiraIdx), 'ちらかす', ...allTokuiRaw.slice(_chiraIdx)] : allTokuiRaw;

const allSukimono = [...new Set(POKEMON_DATA.flatMap(p => p.sukimono))].sort((a,b) => a.localeCompare(b,'ja'));

function buildFilterTags(id, values, key) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  values.forEach(v => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.dataset.key = key;
    span.dataset.val = v;
    span.textContent = v;
    span.addEventListener('click', () => toggleFilter(key, v));
    el.appendChild(span);
  });
}

function toggleFilter(key, value) {
  activeFilters[key].has(value) ? activeFilters[key].delete(value) : activeFilters[key].add(value);
  updateTagHighlight();
  applyFilters();
}

function clearFilter(key) {
  activeFilters[key].clear();
  updateTagHighlight();
  applyFilters();
}

function clearAllFilters() {
  activeFilters = { tokui: new Set(), kankyo: new Set(), sukimono: new Set(), aji: new Set() };
  document.getElementById('searchInput').value = '';
  updateTagHighlight();
  applyFilters();
}

function updateTagHighlight() {
  document.querySelectorAll('.tag').forEach(tag => {
    const _k = tag.dataset.key, _v = tag.dataset.val;
    tag.classList.toggle('active', activeFilters[_k].has(_v) || (_k === 'tokui' && activeFilters.tokui.has('ちらかす') && _v.startsWith('ちらかす（')));
  });
  const parts = [];
  if (activeFilters.tokui.size) parts.push('得意：' + [...activeFilters.tokui].join('・'));
  if (activeFilters.kankyo.size) parts.push('環境：' + [...activeFilters.kankyo].join('・'));
  if (activeFilters.sukimono.size) parts.push('もの：' + [...activeFilters.sukimono].join('・'));
  if (activeFilters.aji.size) parts.push('味：' + [...activeFilters.aji].join('・'));
  document.getElementById('filterSummary').textContent = parts.length ? '▼ ' + parts.join(' / ') : '';
}

function toggleCard(name) {
  selectedSet.has(name) ? selectedSet.delete(name) : selectedSet.add(name);
  const card = document.querySelector('[data-id]');
  // Update all cards with this name
  document.querySelectorAll('.card').forEach(c => {
    if (c.dataset.id === name) c.classList.toggle('selected', selectedSet.has(name));
  });
  updateSelectedUI();
}

function clearAllSelected() {
  selectedSet.clear();
  if (showSelectedOnly) { showSelectedOnly = false; updateShowBtn(); }
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  updateSelectedUI();
  applyFilters();
}

function selectAllVisible() {
  getFilteredData().forEach(p => selectedSet.add(p.name));
  document.querySelectorAll('.card').forEach(c => {
    if (selectedSet.has(c.dataset.id)) c.classList.add('selected');
  });
  updateSelectedUI();
}

function toggleShowSelected() {
  if (selectedSet.size === 0) return;
  showSelectedOnly = !showSelectedOnly;
  updateShowBtn();
  applyFilters();
}

function updateShowBtn() {
  const btn = document.getElementById('showSelectedBtn');
  if (showSelectedOnly) {
    btn.textContent = '\u2714 \u9078\u629e\u4e2d\u306e\u307f\u8868\u793a\u4e2d';
    btn.style.background = '#10b981';
  } else {
    btn.textContent = '\u2714 \u30c1\u30a7\u30c3\u30af\u3057\u305f\u30dd\u30b1\u30e2\u30f3\u3092\u8868\u793a';
    btn.style.background = '';
  }
}

function updateSelectedUI() {
  const cnt = selectedSet.size;
  document.getElementById('selectedCount').textContent = cnt > 0 ? cnt + '\u4f53\u9078\u629e\u4e2d' : '';
  document.getElementById('selectedPanelCount').textContent = cnt;
  const panel = document.getElementById('selectedPanel');
  const summary = document.getElementById('selectedSummary');
  if (cnt > 0) {
    panel.classList.add('show');
    summary.innerHTML = '';
    [...selectedSet].forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'selected-chip';
      chip.textContent = name + ' ';
      const rm = document.createElement('span');
      rm.className = 'rm';
      rm.textContent = '\u00d7';
      rm.addEventListener('click', e => { e.stopPropagation(); removeSelected(name); });
      chip.appendChild(rm);
      summary.appendChild(chip);
    });
  } else {
    panel.classList.remove('show');
    if (showSelectedOnly) { showSelectedOnly = false; updateShowBtn(); }
  }
}

function removeSelected(name) {
  selectedSet.delete(name);
  document.querySelectorAll('.card').forEach(c => {
    if (c.dataset.id === name) c.classList.remove('selected');
  });
  updateSelectedUI();
  applyFilters();
}

function getFilteredData() {
  const search = document.getElementById('searchInput').value.trim();
  const searchLower = search.toLowerCase();
  return POKEMON_DATA.filter(p => {
    if (showSelectedOnly && !selectedSet.has(p.name)) return false;
    if (search && !p.name.toLowerCase().includes(searchLower) && !String(p.no).toLowerCase().includes(searchLower)) return false;
    if (activeFilters.tokui.size > 0 && !p.tokui.some(t => activeFilters.tokui.has(t) || (activeFilters.tokui.has('ちらかす') && t.startsWith('ちらかす（')))) return false;
    if (activeFilters.kankyo.size > 0 && !activeFilters.kankyo.has(p.kankyo)) return false;
    if (activeFilters.sukimono.size > 0 && !p.sukimono.some(s => activeFilters.sukimono.has(s))) return false;
    if (activeFilters.aji.size > 0 && !activeFilters.aji.has(p.aji)) return false;
    return true;
  });
}

function defaultOrder(p) {
  return p.isIbe ? 99999 + (parseInt(String(p.no).replace(/[^0-9]/g,''))||0) : p.no;
}

function applyFilters() {
  let data = getFilteredData();
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'name') {
    data = [...data].sort((a,b) => a.name.localeCompare(b.name,'ja'));
  } else if (sort === 'kankyo') {
    data = [...data].sort((a,b) => {
      const ka = a.kankyo||''; const kb = b.kankyo||'';
      return ka.localeCompare(kb,'ja') || defaultOrder(a) - defaultOrder(b);
    });
  } else if (sort === 'tokui') {
    data = [...data].sort((a,b) => {
      const ta = a.tokui[0]||''; const tb = b.tokui[0]||'';
      return ta.localeCompare(tb,'ja') || defaultOrder(a) - defaultOrder(b);
    });
  }
  renderGrid(data, sort);
  document.getElementById('resultCount').textContent = data.length + ' / ' + POKEMON_DATA.length + '\u4f53';
  document.getElementById('headerStats').textContent = '\u5168' + POKEMON_DATA.length + '\u4f53';
}

      : '<span style="color:var(--text-muted);font-size:10px">-</span>';

    card.innerHTML =
      `<div class="card-header">` +
        `<div class="checkbox"></div>` +
        `<div class="card-name-block">` +
          `<div class="card-no" style="${noStyle}">${noText}</div>` +
          `<div class="card-name">${p.name}</div>` +
          (p.hitoshou ? `<div class="card-hitoshou">\u4e00\u4eba\u79f0\uff1a${p.hitoshou}</div>` : '') +
        `</div>` +
      `</div>` +
      `<div class="card-section">` +
        `<div class="card-label">&#x26A1; \u5f97\u610f\u306a\u3053\u3068</div>` +
        `<div class="card-tags">${tokuiHtml}</div>` +
      `</div>` +
      `<div class="card-section">` +
        `<div class="card-label">&#x1F343; \u597d\u304d\u306a\u74b0\u5883</div>` +
        `<div class="card-tags">${kankyoHtml}</div>` +
      `</div>` +
      `<div class="card-section">` +
        `<div class="card-label">&#x1F37D;&#xFE0F; \u597d\u304d\u306a\u5473</div>` +
        `<div class="card-tags">${ajiHtml}</div>` +
      `</div>` +
      `<div class="card-section">` +
        `<div class="card-label">&#x2B50; \u597d\u304d\u306a\u3082\u306e</div>` +
        `<div class="card-tags">${sukiHtml}</div>` +
      `</div>`;

    card.addEventListener('click', () => toggleCard(p.name));
    grid.appendChild(card);
  });
}

function openDrawer() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Init
buildFilterTags('tokuiTags', allTokui, 'tokui');
buildFilterTags('kankyoTags', allKankyo, 'kankyo');
buildFilterTags('sukimonoTags', allSukimono, 'sukimono');
buildFilterTags('ajiTags', allAji, 'aji');
document.getElementById('searchInput').addEventListener('input', applyFilters);
applyFilters();

</script>
</body>
</html>
